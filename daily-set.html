<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيت اليوم الحصري - Zeeko</title>
    <style>
        /* الألوان المستخرجة بدقة من كود الأندرويد الخاص بك */
        :root {
            --bg-dark: #012638; /* لون شريط الحالة */
            --gradient-1: #03330C; /* الأخضر الغامق من الدايولوج */
            --gradient-2: #002A3E; /* الأزرق الداكن */
            --gradient-3: #001925; /* نهاية التدرج */
            --accent-cyan: #09DDE0; /* لون الحدود المضيئة */
            --button-teal: #018D8E; /* لون أزرار السيتات */
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background: radial-gradient(circle, var(--gradient-2) 0%, var(--bg-dark) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--white);
        }

        .dialog-card {
            /* تدرج الألوان الثلاثي كما في كود الجافا */
            background: linear-gradient(to bottom, var(--gradient-1), var(--gradient-2), var(--gradient-3));
            padding: 40px 20px;
            border-radius: 25px; /* نفس CornerRadius الدايولوج */
            border: 2px solid var(--accent-cyan); /* Stroke الدايولوج */
            box-shadow: 0 0 20px rgba(9, 221, 224, 0.2);
            text-align: center;
            max-width: 320px;
            width: 85%;
            position: relative;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: rgba(1, 141, 142, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            border: 1px solid var(--accent-cyan);
        }

        h1 {
            font-size: 20px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px black;
        }

        p {
            font-size: 14px;
            color: #CCCCCC; /* لون الـ Hint من الكود */
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-set {
            /* تصميم أزرار السيتات من كود setupUI */
            background-color: var(--button-teal);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 35px; /* CornerRadius الأزرار */
            font-weight: bold;
            font-size: 16px;
            display: inline-block;
            transition: 0.3s;
            border: 1.5px solid #FF685203; /* لمسة بسيطة من اللون الذهبي كما في كودك */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-set:active {
            transform: scale(0.95); /* تأثير الضغط من التاتش لسنر */
        }

        .footer {
            margin-top: 25px;
            font-size: 10px;
            opacity: 0.6;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="dialog-card">
    <div class="icon-circle">
        <img src="https://img.icons8.com/fluency/48/piano.png" alt="Piano Icon">
    </div>
    
    <h1>سيت اليوم الحصري 🎹</h1>
    
    <p>بناءً على طلبكم يا فنانين، هذا هو سيت اليوم المختار بعناية. اضغط للتحميل مباشرة.</p>
    
    <a href="https://www.mediafire.com/file/jfjc1mapivfokeg/%25D8%25B3%25D9%258A%25D8%25AA_%25D8%25A5%25D8%25AD%25D8%25AA%25D8%25B1%25D8%25A7%25D9%2581%25D9%258A_%25D8%25B4%25D8%25A7%25D9%2585%25D9%2584_2026_VIP.Set/file">
        تـحـمـيـل الـسـيـت الآن
    </a>

    <div class="footer">
        ZEEKO SETS ORG 2026
    </div>
</div>

</body>
</html>
